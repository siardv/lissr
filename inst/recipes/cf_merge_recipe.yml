- rule_id: DROP-001
  anomaly_ref: A-07
  description: partner desirability — cf08a one-time module
  action: drop_outside
  suffixes_range:
  - '167'
  - '179'
  retain_in:
  - cf08a
  reason: one-time module; not longitudinally comparable
  if_absent: warn_and_skip
  log: true
- rule_id: DROP-002
  anomaly_ref: A-07
  description: video experiment flag — cf11d only
  action: drop_outside
  suffixes:
  - '433'
  retain_in:
  - cf11d
  reason: one-time experimental flag
  if_absent: warn_and_skip
  log: true
- rule_id: DROP-003
  anomaly_ref: A-07
  description: housework hours + attitudes — biennial odd-wave rotation
  action: drop_outside
  suffixes_range:
  - '414'
  - '431'
  retain_in:
  - cf09b
  - cf11d
  - cf13f
  reason: biennial rotating module
  if_absent: warn_and_skip
  log: true
- rule_id: DROP-004
  anomaly_ref: A-07
  description: school denomination old numbering — early waves only
  action: drop_outside
  suffixes_range:
  - '282'
  - '296'
  retain_in:
  - cf08a
  - cf09b
  - cf10c
  reason: discontinued after cf10c
  if_absent: warn_and_skip
  log: true
- rule_id: DROP-005
  anomaly_ref: A-05
  description: flag ambiguous statement variables 409-413 (identical metadata labels)
  action: flag_only
  suffixes:
  - '409'
  - '410'
  - '411'
  - '412'
  - '413'
  waves_present:
  - cf09b
  - cf11d
  - cf13f
  reason: identical metadata labels; truncated value labels in 413
  log: true
- rule_id: DROP-006
  anomaly_ref: A-07
  description: 'childcare cost variables irregularly absent from cf12e. 383/385/386
    are in fact present in cf12e; the genuine absences are 251/339/381/382/384/387.'
  action: flag_absence
  suffixes:
  - '251'
  - '339'
  - '381'
  - '382'
  - '384'
  - '387'
  absent_in:
  - cf12e
  reason: irregular absence; possibly abbreviated questionnaire
  log: true
- rule_id: DROP-007
  anomaly_ref: A-13
  description: 'documentary: child behaviour battery 225-237 (cf08a-cf14g) is a DISTINCT
    instrument from the parent-child relationship battery 504-521 (cf15h+). despite their
    complementary wave windows they are not the same construct and are intentionally NOT
    bridged; they remain separate columns after stacking.'
  action: note_only
  suffixes:
  - '225'
  - '237'
  reason: distinct instrument; deliberate segmentation, not a renumbering
  log: true
- rule_id: DROP-008
  anomaly_ref: A-13
  description: 'documentary: parent-child relationship battery 504-521 (cf15h+) is the
    counterpart to DROP-007. introduced at cf15h, it is a distinct instrument from the
    discontinued 225-237 battery and is retained as its own column block.'
  action: note_only
  suffixes:
  - '504'
  - '521'
  reason: distinct instrument introduced at cf15h; not pooled with 225-237
  log: true
- rule_id: NOTE-001
  anomaly_ref: A-14
  description: 'documentary: "Who do you consider to be your father/mother?" items 522-525
    were introduced at cf19l. 522/524 are categorical; 523/525 are the free-text "- other,
    namely" companions (coerced to character by VAR-005). no harmonization beyond that.'
  action: note_only
  suffixes:
  - '522'
  - '523'
  - '524'
  - '525'
  reason: late-introduced block (cf19l+); no cross-wave recode needed
  log: true
- rule_id: NOTE-002
  anomaly_ref: A-14
  description: 'documentary: sexual-preference item 535 was introduced at cf22o. its -8
    ("prefer not to say") and -9 ("I don''t know") sentinels are handled by HARM-004 and
    HARM-001 respectively.'
  action: note_only
  suffixes:
  - '535'
  reason: late-introduced item (cf22o+); sentinels handled by HARM-001/HARM-004
  log: true
- rule_id: NOTE-003
  anomaly_ref: A-14
  description: 'documentary: items 554-556 (where parents / father / mother live) appear only
    in cf24q. -9 sentinels are covered by HARM-001. retained as wave-specific columns; no
    cross-wave pooling.'
  action: note_only
  suffixes:
  - '554'
  - '555'
  - '556'
  reason: single-wave block (cf24q only)
  log: true
derived_variables:
