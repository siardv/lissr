- check_id: VAL-006
  anomaly_ref: A-10
  description: 'school denomination old block (282-296) tops out at code 7 ("I don''t know"),
    so code 8 must be absent in cf08a-cf10c. cross-era hazard documented: code 7 = "I don''t
    know" in the old block but "Islamic" in the new block (434-448), so the two numbering
    schemes are not directly poolable on raw codes (see HARM-003, DROP-004).'
  type: value_absence_check
  severity: error
  variable: '282'
  waves:
  - cf08a
  - cf09b
  - cf10c
  forbidden_values:
  - 8
