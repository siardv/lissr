# explicit actions, comparability contracts, audit-grade logging,
# expected_presence, taxonomy refs
# conforms to CANONICAL_SCHEMA.md v1.0.0

meta:
  module: cf
  module_label: Family and Household
  recipe_version: "1.2.0"
  created: '2026-02-10'
  source_spec: cross-wave harmonization specification
  covered_waves:
  - cf08a
  - cf09b
  - cf10c
  - cf11d
  - cf12e
  - cf13f
  - cf14g
  - cf15h
  - cf16i
  - cf17j
  - cf18k
  - cf19l
  - cf20m
  - cf21n
  - cf22o
  - cf23p
  - cf24q
  notes: >-
    validated against cf_variables.csv / cf_value_labels.csv and the 17 wave
    CSVs: HARM-003 denomination mapping and description corrected (code 7 =
    Islamic added at cf11d, pushing I don't know to 8); HARM-001 narrowed to
    -9 (-1 occurs in no label or data); added scoped -8 recode (HARM-004) and
    positive-DK recode_to_na rules (HARM-005/006/007) for the 999/9999/99999
    sentinel regimes; BOUND-001 re-expressed from the retain_where_present
    stub to structural_na (MR-01); added cf14g->cf15h renumbering crosswalks
    (BOUND-007/008/009/010, with a partial-comparability contract on
    contact-frequency items) and the 432->526 crosswalk (BOUND-011); added
    VAR-005 type_coerce for the 523/525 free-text companions; DROP-006 absence
    list corrected to 251/339/381/382/384/387; VAL-006 rewritten around the
    real code-7 meaning flip; documentary note_only entries added for 225-237
    vs 504-521 and for 522-525 / 535 / 554-556. role_map,
    expected_presence.fieldwork_ym, and VAR-002/003/004 are unchanged.
  schema_version: "1.0.0"
global:
  id_variable: nomem_encr
  wave_variable: wave_id
  year_variable: wave_year
  labelled_policy: to_numeric
  missing_variable_policy: warn_and_skip
  strip_label_whitespace: true
  expected_presence:
    critical:
    - variable: nomem_encr
      waves: all
      on_absence: error
    - variable: fieldwork_ym
      waves: all
      on_absence: warn
    optional_note: add module-specific critical variables here
