variable_rules:
- rule_id: VAR-001
  anomaly_ref: null
  description: strip wave-specific prefix to create generic suffix names
  action: strip_prefix
  exceptions:
  - nomem_encr
  - nohouse_encr
  log: true
- rule_id: VAR-002
  anomaly_ref: null
  description: coerce the fieldwork-month column to integer (numeric yyyymm in
    all 17 archive waves; re-keyed from the unread target_suffixes form in 1.4)
  action: type_coerce
  suffixes:
  - _m
  target_type: integer
  if_absent: warn_and_skip
  log: true
- rule_id: VAR-003
  anomaly_ref: A-08
  description: evaluation items 388-392 are F1.0 numeric in ALL 17 archive waves
    (cf_scan_results, 2026-07-11); the recorded cf11d type inconsistency does not
    reproduce, so no coercion is needed. the stacking-time type harmonizer covers
    any future drift. retired to documentation in 1.4.
  action: note_only
  target_suffixes:
  - '388'
  - '389'
  - '390'
  - '391'
  - '392'
  target_type: integer
  if_absent: warn_and_skip
  log: true
- rule_id: VAR-004
  anomaly_ref: A-08
  description: coerce completion time (397) to numeric. the spss format widens
    from F8.0 to F10.0 exactly at cf20m, verified against all 17 archive waves;
    re-keyed from the unread target_suffixes form in 1.4
  action: type_coerce
  suffixes:
  - '397'
  target_type: numeric
  if_absent: warn_and_skip
  log: true
- rule_id: VAR-005
  anomaly_ref: A-08
  description: coerce the free-text "- other, namely" companions 523 and 525 to character.
    they are A-format (string) in the codebook for every wave they appear (cf19l+), but waves
    where the column is entirely empty otherwise infer as logical/numeric on CSV read and would
    break the stack. uses the 'suffixes' key so the engine reads the scope.
  action: type_coerce
  suffixes:
  - '523'
  - '525'
  target_type: character
  if_absent: warn_and_skip
  log: true
harmonization_rules:
- rule_id: HARM-001
  anomaly_ref: null
  description: recode the 'unknown' / DK code -9 to NA on the columns that carry it.
    scope verified against all 17 archive waves (cf_scan_results, 2026-07-11); -9
    occurs ONLY on the imputation-flag trio 398/399/400 (label 'unknown', from
    cf10c; their spss user-missing declarations are inconsistent across waves, so
    this recode is load-bearing), on 535 from cf22o, and on 554/555/556 in cf24q.
    the pre-1.4 form targeted every numeric column via an unread 'target' key and
    never executed. -1 is excluded because it occurs in no value label and no
    sampled data for this module.
  action: recode_to_na
  recodes:
  - waves: [cf10c, cf11d, cf12e, cf13f, cf14g, cf15h, cf16i, cf17j, cf18k, cf19l,
            cf20m, cf21n, cf22o, cf23p, cf24q]
    codes: [-9]
    scope: ["398", "399", "400"]
  - waves: [cf22o, cf23p, cf24q]
    codes: [-9]
    scope: ["535"]
  - waves: [cf24q]
    codes: [-9]
    scope: ["554", "555", "556"]
  if_absent: warn_and_skip
  log: true
- rule_id: HARM-002
  anomaly_ref: A-02
  description: 'evaluation items 388-392 carry three endpoint-label translation eras,
    verified against all 17 archive waves (cf_scan_results, 2026-07-11): cf08a-cf13f
    "1 = definitely no/5 = definitely yes", cf14g-cf21n "1 = certainly not/5 =
    certainly yes", cf22o+ the same wording without the "=". codes 1-5 are stable
    throughout, so the eras are a translation artifact, not an instrument change,
    and pooling on raw codes is sound. the pre-1.4 form was a value_recode with
    string targets, which never executed (unread target_suffixes) and, if
    re-keyed naively, would have coerced every response to NA; re-expressed as
    documentation.

    '
  action: note_only
  target_suffixes:
  - '388'
  - '389'
  - '390'
  - '391'
  - '392'
  log: true
- rule_id: HARM-003
  anomaly_ref: A-10
  description: 'school denomination, new numbering 434-448 (cf11d+): 8-category
    scheme with code 7 Islamic and code 8 "I don''t know", verified against all
    cf11d-cf24q waves (cf_scan_results, 2026-07-11; cf12e labels code 7
    "Islamitic", a spelling variant of the same category). the old numbering
    282-296 (cf08a-cf10c) is the 7-category scheme where code 7 means "I don''t
    know" and is NOT pooled with this block on raw codes (DROP-004, VAL-006).
    codes are kept as the codebook scheme; the pre-1.4 form was a value_recode
    to category-name strings, which never executed and would have coerced the
    items to NA if re-keyed; re-expressed as documentation.

    '
  action: note_only
  target_suffixes:
  - '434'
  - '435'
  - '436'
  - '437'
  - '438'
  - '439'
  - '440'
  - '441'
  - '442'
  - '443'
  - '444'
  - '445'
  - '446'
  - '447'
  - '448'
  log: true
- rule_id: HARM-004
  anomaly_ref: A-09
  description: recode -8 ('I prefer not to say') to NA on suffix 535 (sexual
    preference), introduced at cf22o. verified against cf22o/cf23p/cf24q; -8
    occurs on no other column in any archive wave.
  action: recode_to_na
  codes:
  - -8
  suffixes: ["535"]
  waves:
  - cf22o
  - cf23p
  - cf24q
  if_absent: warn_and_skip
  log: true
- rule_id: HARM-005
  anomaly_ref: A-09
  description: recode positive don't-know sentinel 999 to NA on the categorical items that
    carry it (SC-01 regime). 999 = "I don't know" on suffixes 166/180/181 in all waves.
  action: recode_to_na
  codes:
  - 999
  suffixes:
  - '166'
  - '180'
  - '181'
  waves: all
  if_absent: warn_and_skip
  log: true
- rule_id: HARM-006
  anomaly_ref: A-09
  description: recode positive don't-know sentinel 9999 to NA (SC-01 regime, cf11d+). affects
    the monetary/count items 005/008/009/012 and childcare-cost items 251/339/381/382/384/387.
    251 etc. are absent from cf12e (handled by if_absent).
  action: recode_to_na
  codes:
  - 9999
  suffixes:
  - '005'
  - '008'
  - '009'
  - '012'
  - '251'
  - '339'
  - '381'
  - '382'
  - '384'
  - '387'
  waves:
  - cf11d
  - cf12e
  - cf13f
  - cf14g
  - cf15h
  - cf16i
  - cf17j
  - cf18k
  - cf19l
  - cf20m
  - cf21n
  - cf22o
  - cf23p
  - cf24q
  if_absent: warn_and_skip
  log: true
- rule_id: HARM-007
  anomaly_ref: A-09
  description: recode positive don't-know sentinel 99999 to NA (SC-01 regime, early waves
    cf08a-cf10c) on the same items that switch to 9999 from cf11d. note 008's 99999 label is
    only attested in cf09b/cf10c (Dutch "Ik weet het niet"); rule is defensive across cf08a-cf10c.
  action: recode_to_na
  codes:
  - 99999
  suffixes:
  - '005'
  - '008'
  - '009'
  - '012'
  - '251'
  - '339'
  - '381'
  - '382'
  - '384'
  - '387'
  waves:
  - cf08a
  - cf09b
  - cf10c
  if_absent: warn_and_skip
  log: true
boundary_rules:
- rule_id: BOUND-001
  anomaly_ref: A-01
  # REEXPRESSED_FROM: retain_where_present
  description: nohouse_encr (household identifier) present only cf08a-cf10c and discontinued
    from cf11d. emit a presence flag and let the column fall to structural NA after the
    boundary (MR-01). the raw nohouse_encr column still stacks as NA post-cf10c, so VAL-004
    continues to hold.
  action: structural_na
  variable: nohouse_encr
  present_in_waves:
  - cf08a
  - cf09b
  - cf10c
  flag_true_waves:
  - cf08a
  - cf09b
  - cf10c
  flag_column: cf_household_present
  if_absent: warn_and_create_na
  log: true
- rule_id: BOUND-002
  anomaly_ref: A-03
  description: 'respondent gender: suffix 003 (cf08a-cf21n) -> 536 (cf22o+)'
  action: crosswalk_rename
