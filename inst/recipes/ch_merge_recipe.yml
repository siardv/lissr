# ========================================================================
# LISS Panel Health (CH) Module merge recipe
# ========================================================================
# explicit actions, comparability contracts, audit-grade logging,
# expected_presence, taxonomy refs
# conforms to CANONICAL_SCHEMA.md v1.0.0

meta:
  module: ch
  module_label: Health
  recipe_version: "1.1.0"
  created: '2026-02-10'
  source_spec: cross-wave harmonization specification
  covered_waves:
  - ch07a
  - ch08b
  - ch09c
  - ch10d
  - ch11e
  - ch12f
  - ch13g
  - ch15h
  - ch16i
  - ch17j
  - ch18k
  - ch19l
  - ch20m
  - ch21n
  - ch22o
  - ch23p
  - ch24q
  - ch25r
  notes: >-
    V06 re-expressed note_only -> fix_label for the ch08b Dutch 'variabele'
    labels, suffixes corrected to 001-003 and waves to [ch08b] (A-12); CHK05
    waves_allowed extended to [ch22o, ch23p, ch24q] at error severity,
    confirmed against codebook_ch22o_EN_1_0 (gender preload lists 1 male, 2
    female, 3 other), and H03's premise amended to match; B06 crosswalk_rename
    bridges ch08b suffix 244 into the 261 series (NM-01 pattern); B07-B11
    structural_na presence flags document late introductions 263-264 (ch13g),
    265-267 (ch15h), 268 (ch19l), 269-271 (ch20m, A-15) and 272-277 (ch24q,
    A-16); B12 add_period_flag covers the suffix 020 rewording at ch24q
    (A-18); V14/V15 document undocumented discontinuations (122/124 end at
    ch18k; 019 ends at ch20m); suffixes 245-249 added to V10 and CHK02;
    V09/V10 availability claims corrected (059, 123, 204, 205 start at ch08b;
    261 starts at ch09c); V08 extended to ch07a's full 52-suffix absence set;
    H02 ranges extended with 143-144, 265 and 267 plus a suffix 112
    tail-variant note; B04/B05 boundary fields filled. note_only payloads
    marked TODO_REEXPRESS pending engine support.
  schema_version: "1.0.0"
global:
  id_variable: nomem_encr
  wave_variable: wave_id
  year_variable: wave_year
  labelled_policy: to_numeric
  missing_variable_policy: warn_and_create_na
  strip_label_whitespace: true
  expected_presence:
    critical:
    - variable: nomem_encr
      waves: all
      on_absence: error
    - variable: fieldwork_ym
      waves: all
      on_absence: warn
    optional_note: add module-specific critical variables here
