harmonization_rules:
- rule_id: H01
  anomaly_ref: A-11
  description: swap labels for suffixes 255 and 259 in ch08b if data confirms swap
  action: conditional_label_swap
  waves:
  - ch08b
  if_absent: warn_and_skip
  log: true
  suffix_a: '255'
  suffix_b: '259'
  label_a_correct: Starting date of the questionnaire
  label_b_correct: Duration in seconds
  condition: check data — if s255 contains date strings, swap labels only
  fallback: swap_labels_only
- rule_id: H02
  anomaly_ref: A-08
  description: normalise ch19l variable labels — strip embedded question stems
  action: strip_question_stem
  waves:
  - ch19l
  if_absent: warn_and_skip
  log: true
  suffixes_affected:
  - range:
    - '070'
    - 098
  - range:
    - '127'
    - '129'
  - range:
    - '136'
    - '142'
  - range:
    - '145'
    - '158'
  - range:
    - '159'
    - '168'
  - range:
    - '169'
    - '184'
  - range:
    - '206'
    - '228'
  - range:
    - '143'
    - '144'
  - range:
    - '265'
    - '265'
  - range:
    - '267'
    - '267'
  notes: "ch19l also embeds question stems on 143-144 (other alcoholic drink), 265 (e-cigarettes) and 267 (dental hygienist); suffix 112 carries a tail-wording variant ('... so that you can continue working?') that stem stripping does not normalize and is left for manual review"
- rule_id: H03
  anomaly_ref: A-17
  description: harmonise gender coding, category 3 ('other') defined from ch22o onward; schema extended for all waves
  action: extend_categories
  waves: all
  if_absent: warn_and_skip
  log: true
  suffix: '001'
  categories:
    1: male
    2: female
    3: other
  notes: "category 3 'other' is defined in the value-label metadata from ch22o and confirmed in codebook_ch22o_EN_1_0; A-17's ch24q-only claim is superseded (see CHK05)"
# V06 relocated from variable_rules: fix_label is a harmonization_rules action (engine + schema vocab); payload preserved verbatim
- rule_id: V06
  anomaly_ref: A-12
  description: replace Dutch 'variabele' with 'variable' in ch08b labels (suffixes 001-003)
  action: fix_label  # REEXPRESSED_FROM: note_only
  waves:
  - ch08b
  suffixes:
  - '001'
  - '002'
  - '003'
  if_absent: warn_and_create_na
  log: true
  old_fragment: variabele
  new_fragment: variable
  notes: "corrected labels per A-12: '001' -> 'preloaded variable: gender', '002' -> 'preloaded variable: age', '003' -> 'preloaded variable: job'; 'variabele' occurs only in ch08b and only on these three suffixes"
