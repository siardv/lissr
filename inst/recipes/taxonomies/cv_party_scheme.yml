# cv party-code taxonomy: canonical value-label registry for the vote items
# (actual vote and hypothetical vote). referenced by meta.party_scheme in
# cv_merge_recipe.yml; each wave_index entry declares which scheme applies
# and which wave-specific suffixes carry the two items (vote_actual_suffix,
# vote_hypo_suffix; suffixes are owned by the recipe and deliberately not
# duplicated here). labels are reproduced verbatim from the spss value
# labels of the verified source files.
meta:
  taxonomy: cv_party_scheme
  version: 2.0.0
  status: catalogued
  catalogued_schemes: [1, 2, 3, 4, 5]
  open_items:
  - >-
    late scheme-3 code sets: the 2021 election falls inside the scheme-3
    span, so cv22n/cv23o are expected to extend the cv18j list with appended
    codes (16-19); harvest cv22n to verify and to decide whether the recipe
    should split the scheme
  - >-
    identity of registry code 19: assigned after the cv18j list and retired
    before scheme 4; expected to surface in the cv22n harvest
  provenance: >-
    catalogued 2026-07-06 from value labels only (zero data rows): scheme 1
    from cv08a054/cv08a058 (cv08a_1.1p_EN.sav), scheme 2 from
    cv13f207/cv13f209 (cv13f_EN_1.0p.sav), scheme 3 from cv18j307/cv18j308
    (cv18j_EN_1.0p.sav), scheme 4 from cv25q307/cv25q308
    (cv25q_EN_1.0p.sav), scheme 5 from cv26r307/cv26r308
    (cv26r_EN_1.0p.sav)
  code_semantics: >-
    two regimes. schemes 1 and 2 are election-specific lists: codes are
    renumbered between schemes (CDA is 1, then 5, then 3; VVD is 3, then 1)
    and must never be pooled across schemes; in scheme 1 the actual and
    hypothetical items do not even share a party set. from scheme 3 onward
    the codes form a persistent registry: every code shared by schemes 3, 4,
    and 5 denotes the same party, new parties are appended, retired parties
    leave their code unassigned, and returning parties reclaim their
    historical code (50PLUS returns at actual-code 10 in scheme 5).
  special_code_note: >-
    dk and refusal codes follow each wave's dk_scheme (999/998 high-positive
    through cv19k, -9/-8 negative from cv20l), not the party scheme; the
    values recorded per scheme below are as observed on that scheme's
    verified wave
  hypo_offset_note: >-
    hypo_offset gives the uniform shift from actual-vote codes to
    hypothetical-vote codes for the parties of a scheme (specials excluded);
    scheme 1 has none because its two items carry independent lists

