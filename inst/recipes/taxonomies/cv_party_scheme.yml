# cv party-code taxonomy: canonical value-label registry for the vote items
# (suffix 307 = actual vote, suffix 308 = hypothetical vote). referenced by
# meta.party_scheme in cv_merge_recipe.yml; each wave_index entry declares
# which scheme applies to its 307/308 codes. labels are reproduced verbatim
# from the spss value labels of the named source files.
meta:
  taxonomy: cv_party_scheme
  version: 1.0.0
  status: partial
  catalogued_schemes: [4, 5]
  pending_schemes: [1, 2, 3]
  provenance: >-
    schemes 4 and 5 catalogued 2026-07-06 from the value labels of
    cv25q307/cv25q308 (cv25q_EN_1.0p.sav) and cv26r307/cv26r308
    (cv26r_EN_1.0p.sav); zero data rows were read
  code_semantics: >-
    codes form a stable party registry, not per-election ballot numbers:
    every code shared by schemes 4 and 5 denotes the same party, retired
    parties leave their code unassigned, and returning parties reclaim
    their historical code (50PLUS returns at 307:10). a scheme id therefore
    names the code set a wave can contain, not a renumbering.
  offset_relation: >-
    within every scheme, code_308 equals code_307 plus one for every
    registry entry; suffix 308 additionally places would-not-vote at code 1;
    dk (-9) and refusal (-8) are unshifted on both suffixes

special_codes:
- key: dk
  code_307: -9
  code_308: -9
  label: 'I dont know'
- key: refusal
  code_307: -8
  code_308: -8
  label: 'I prefer not to say'
- key: would_not_vote
  code_307: null
  code_308: 1
  label_pattern: '[if {wave_id}243=0: I would not vote]'

schemes:
- scheme: 1
  waves: [cv08a, cv09b, cv10c, cv11d, cv12e]
  status: pending_catalogue
- scheme: 2
  waves: [cv13f, cv14g, cv16h, cv17i]
  status: pending_catalogue
- scheme: 3
  waves: [cv18j, cv19k, cv20l, cv21m, cv22n, cv23o]
  status: pending_catalogue
- scheme: 4
  waves: [cv24p, cv25q]
  status: catalogued
  unassigned_codes_307: [5, 7, 10, 19]
  notes: >-
    unassigned codes are registry slots of parties retired before this
    scheme; identifying them awaits the scheme 1-3 catalogues (10 is
    50PLUS's slot, vacant here and reoccupied in scheme 5)
  parties:
  - {key: vvd, code_307: 1, code_308: 2, label: 'VVD (liberal party)'}
  - {key: pvv, code_307: 2, code_308: 3, label: 'PVV (Wilders freedom party)'}
  - {key: cda, code_307: 3, code_308: 4, label: 'CDA (Christian democrat party)'}
  - {key: d66, code_307: 4, code_308: 5, label: 'D66 (social-liberal party)'}
  - {key: sp, code_307: 6, code_308: 7, label: 'SP (socialist party)'}
  - {key: christenunie, code_307: 8, code_308: 9, label: 'ChristenUnie (Christian union party)'}
  - {key: pvdd, code_307: 9, code_308: 10, label: 'Partij voor de Dieren (animal welfare party)'}
  - {key: sgp, code_307: 11, code_308: 12, label: 'SGP (Christian Reformed party)'}
  - {key: denk, code_307: 12, code_308: 13, label: 'DENK'}
  - {key: fvd, code_307: 13, code_308: 14, label: 'Forum voor Democratie (party for democracy)'}
  - {key: blank, code_307: 14, code_308: 15, label: 'blank'}
  - {key: other_party, code_307: 15, code_308: 16, label: 'other party'}
  - {key: volt, code_307: 16, code_308: 17, label: 'Volt'}
  - {key: ja21, code_307: 17, code_308: 18, label: 'JA21 (Right Answer 2021)'}
  - {key: bbb, code_307: 18, code_308: 19, label: 'BBB (farmer–citizen movement)'}
  - {key: gl_pvda, code_307: 20, code_308: 21, label: 'GroenLinks (green party)-PvdA (labor party)'}
  - {key: nsc, code_307: 21, code_308: 22, label: 'NSC (New Social Contract)'}
