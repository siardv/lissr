# ========================================================================
# LISS Panel Personality (CP) Module merge recipe
# ========================================================================
# explicit actions, comparability contracts, audit-grade logging,
# expected_presence, taxonomy refs
# conforms to CANONICAL_SCHEMA.md v1.0.0

meta:
  module: cp
  module_label: Personality
  recipe_version: "1.1.0"
  created: '2026-02-09'
  source_spec: cross-wave harmonization specification
  covered_waves:
  - cp08a
  - cp09b
  - cp10c
  - cp11d
  - cp12e
  - cp13f
  - cp14g
  - cp15h
  - cp17i
  - cp18j
  - cp19k
  - cp20l
  - cp21m
  - cp22n
  - cp23o
  - cp24p
  notes: >-
    removed item 135 from V04 (present and populated in period B) and added
    V14 period-B range check (1-7) on 135; restored the rename machinery as
    live variable_rules (questionnaire_version from s195/s196/s197, cp13f
    s208-s216 to _exp_ios_*, s_m to fieldwork_ym); DV08 per-wave value
    crosswalks (cp10c reverse-coded) and cp11d196 split into DV09
    video_experiment_participation; fixed dangling DV06/DV07 source references
    and DV06 NA for cp08a-cp11d; added boundary rules A9 paradata
    add_period_flag (A-09) and cp16 note_only (A-06); set DR01/DR02
    anomaly_ref to A-05/A-04; marked A8 type_coerce stub TODO_REEXPRESS
  schema_version: "1.0.0"
global:
  id_variable: nomem_encr
  wave_variable: wave_id
  year_variable: wave_year
  labelled_policy: to_numeric
  missing_variable_policy: warn_and_create_na
  strip_label_whitespace: true
  expected_presence:
    critical:
    - variable: nomem_encr
      waves: all
      on_absence: error
    - variable: fieldwork_ym
      waves: all
      on_absence: warn
    optional_note: add module-specific critical variables here
