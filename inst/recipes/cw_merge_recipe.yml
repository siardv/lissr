validation_checks:
- check_id: V01_edu_scheme_integrity
  anomaly_ref: A-01
  description: no scheme-3-only codes (29, 30) appear before wave 24q
  type: value_absence
  severity: error
  variable: edu_harmonized
  forbidden_values:
  - 56
  - 57
  in_waves:
  - cw11d
  - cw12e
  - cw13f
  - cw14g
  - cw15h
  - cw16i
  - cw17j
  - cw18k
  - cw19l
  - cw20m
  - cw21n
  - cw22o
  - cw23p
- check_id: V02_wage_numeric
  anomaly_ref: A-02
  description: q323 contains only numeric >= 0 or sentinel/NA
  type: range_check
  severity: error
  variable: q323
  valid_range:
  - 0
  - 1000000
  allow_na: true
  allow_sentinel: true
  sentinel_values:
  - -9
  - -8
- check_id: V03_q112_structure
  anomaly_ref: A-03
  description: q112 is character in 11d-20m and all-NA in 21n-25r
  type: structural_absence
  severity: error
  variable: q112
  must_be_na_in:
  - cw21n
  - cw22o
  - cw23p
  - cw24q
  - cw25r
- check_id: V04_employment_binary
  anomaly_ref: A-04
  description: q088-q102 contain only 0, 1, or NA
  type: value_set
  severity: error
  variables:
  - q088
  - q089
  - q090
  - q091
  - q092
  - q093
  - q094
  - q095
  - q096
  - q097
  - q098
  - q099
  - q100
  - q101
  - q102
  allowed_values:
  - 0
  - 1
  allow_na: true
- check_id: V05_training_module_absent
  anomaly_ref: A-05
  description: training variables all-NA in post-restructuring waves
  type: structural_absence
  severity: error
  variables:
  - q036
  - q037
  - q038
  - q039
  - q041
  - q051
  - q060
  - q070
  - q080
  - q087
  must_be_na_in:
  - cw19l
  - cw20m
  - cw21n
  - cw22o
  - cw23p
  - cw24q
  - cw25r
- check_id: V06_pension_module_absent
  anomaly_ref: A-06
  description: pension module variables all-NA before 25r
  type: structural_absence
  severity: error
  variables:
  - q614
  - q615
  - q629
  - q650
  - q673
  - q683
  must_be_na_in:
  - cw11d
  - cw12e
  - cw13f
  - cw14g
  - cw15h
  - cw16i
  - cw17j
  - cw18k
  - cw19l
  - cw20m
  - cw21n
  - cw22o
  - cw23p
  - cw24q
- check_id: V07_pension_dates_numeric
  anomaly_ref: A-07
  description: pension date variables are plausible years after harmonization
  type: range_check
  severity: warning
  variables:
  - q149
  - q153
  - q157
  - q161
  - q165
  - q169
  - q173
  - q177
  - q181
  - q185
  valid_range:
  - 1990
  - 2030
  allow_na: true
- check_id: V08_no_sentinels
  anomaly_ref: null
  description: no -9 or -8 remain in any numeric column after recoding
  type: sentinel_absence
  severity: error
  sentinel_values:
  - -9
  - -8
  applies_to: all_numeric
- check_id: V09_panel_overlap
  anomaly_ref: A-12
  description: panel respondent overlap matrix is plausible
  type: panel_overlap
  severity: warning
  id_variable: nomem_encr
  min_retention_pct: 20
  max_retention_pct: 100
- check_id: V10_row_count
  anomaly_ref: null
  description: merged dataset row count equals sum of wave row counts
  type: row_count_sum
  severity: error
- check_id: V11_edu_crosswalk_coverage
  anomaly_ref: A-01
  description: 'crosswalk coverage: every non-missing q005 value has a
    crosswalk entry, i.e. the edu_harmonized NA count equals the q005 NA count
    within every wave'
  type: na_parity
  severity: error
  variable: edu_harmonized
  reference_variable: q005
  group_by: wave_id
- check_id: V12_cw19l_edu_gap
  anomaly_ref: A-01
  description: edu_harmonized is all-NA in cw19l (q005 is absent from that
    wave; converts the silent one-wave gap in the headline harmonized variable
    into an asserted expectation)
  type: structural_absence
  severity: error
  variable: edu_harmonized
  must_be_na_in:
  - cw19l
logging:
  log_file: cw_merge_log.jsonl
  report_file: cw_merge_report.txt
  log_format: jsonl
  per_rule_fields:
  - rule_id
  - wave_id
  - variable
  - action
  - rows_affected
  - values_changed
  - distinct_before
  - distinct_after
  - na_count_before
  - na_count_after
  - timestamp
  - duration_ms
  summary_artifact:
    enabled: true
    include:
    - total_na_created
    - total_values_recoded
    - total_rows_dropped
    - total_vars_dropped
    - wave_row_counts
    - per_variable_na_rates
