# conforms to CANONICAL_SCHEMA.md v1.0.0

meta:
  module: cw
  module_label: Work and Schooling
  recipe_version: "1.1.0"
  created: '2026-02-10'
  source_spec: cross-wave harmonization specification
  covered_waves:
  - cw11d
  - cw12e
  - cw13f
  - cw14g
  - cw15h
  - cw16i
  - cw17j
  - cw18k
  - cw19l
  - cw20m
  - cw21n
  - cw22o
  - cw23p
  - cw24q
  - cw25r
  notes: >-
    HR02 education crosswalk completed for the upper codes (scheme-1 19-27
    mapped into scheme-2/3 numbering 20-28; scheme-2 identity 20-28; scheme-3
    19->51 plus identity 20-28) with coverage check V11 added; BR01 overbroad
    pattern replaced by the exact decomposition of the 93 drops (79 stable
    drops enumerated; q211/q255 reintroduced in cw25r; q005 plus
    q040/q042-q047/ q049/q050/q052/q053 absent in cw19l only; q028 absent from
    cw20m and q029 from cw21n) and the redundant additional_dropped list
    removed; BR02 span corrected to q549-q609 with cw19l-only
    q556/q573/q574/q575 carved out; the cw16i-only q540-q548 expenditure block
    and the q610-q613 introductions documented as note_only rules; BR03
    phantom ids q619-q628 and q680 noted; fieldwork months for cw22o-cw25r
    corrected to April; anomaly_ref bookkeeping fixed (V09 -> A-12, HR01 and
    V08 -> null); VR03 extended with q359 and q362; VR05 description trimmed
    to what coerce_type performs; structural check V12 asserts the cw19l
    education gap. Scope note: A-10 and A-11 carry no rules by design (they
    require codebook documentation, not merge transforms). Action names and
    payload shapes retained; the HR02 crosswalk payload is marked
    TODO_REEXPRESS pending the crosswalk executor and unmapped-value policy.
  schema_version: "1.0.0"
