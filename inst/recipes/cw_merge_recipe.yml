- rule_id: BR02_new_block_549
  anomaly_ref: A-05
  description: new q549-q609 block; insert structural NA for pre-restructuring waves
  action: structural_na
  # corrected span: the post-restructuring block runs q549-q609 (60 variables);
  # the former pattern q5[4-8][0-9]|q5[5-8][0-3] resolved to q540-q589, which
  # falsely claimed the cw16i-only q540-q548 expenditure block (see
  # BR05_cw16i_expenditure_block) and missed q590-q609 entirely
  new_variables_pattern: q5(49|[5-9][0-9])|q60[0-9]
  # the pattern spans 61 ids; q571 exists in no wave, so the observed block
  # holds 60 variables. harmless while the engine matches observed columns only
  nonexistent_ids_matched_by_pattern:
  - q571
  cw19l_only_variables:
