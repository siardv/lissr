boundary_rules:
- rule_id: A2_hobby_freq_flag
  anomaly_ref: A-02
  description: 'Flag stems 160-179 as non-comparable across cs19l/cs20m boundary. Pre-cs20m: numeric open entry, conditional
    on participation, 80-96% structural missing.  Post-cs20m: categorical with code 99=''never'', asked unconditionally, 0%
    missing.  Conservative strategy: do NOT pool.

    '
  action: add_period_flag
  waves_early:
  - cs08a
  - cs09b
  - cs10c
  - cs11d
  - cs12e
  - cs13f
  - cs14g
  - cs15h
  - cs16i
  - cs17j
  - cs18k
  - cs19l
  waves_late:
  - cs20m
  - cs21n
  - cs22o
  - cs23p
  - cs24q
  - cs25r
  stems:
  - '160'
  - '161'
  - '162'
  - '163'
  - '164'
  - '165'
  - '166'
  - '167'
  - '168'
  - '169'
  - '170'
  - '171'
  - '172'
  - '173'
  - '174'
  - '175'
  - '176'
  - '177'
  - '178'
  - '179'
  - '500'  # present cs15h+; relabelled from blu-ray/DVD to films and series at cs20m
  flag_column: hobby_freq_period
  early_label: open_numeric
  late_label: categorical_99
  log: true
  comparability:
    status: partial
    method: pool_with_flags
    rationale: 'Flag stems 160-179 as non-comparable across cs19l/cs20m boundary. Pre-cs20m: numeric open entry, conditional
      on participation, 80-96% structural missing.  Post-cs20m: categorical with code 99=''never'', asked unconditionally,
      0% missing.  Conservative strategy: do NOT pool.

      '
- rule_id: A3_org_no_connection
  anomaly_ref: A-03
  description: 'Map the thirteen organisation-battery ''no connection'' stems (003-058 in steps of five, plus 523 introduced
    at cs20m) to the ''none of these'' replacement stems (607-619) introduced in cs23p. Conservative strategy: do NOT pool.
    A single flag column (org_membership_period) marks the period.

    '
  action: add_period_flag
  # TODO_REEXPRESS: the crosswalk payload below is documentation-only under the current engine.
  # Re-expressing it as crosswalk_rename would pool the old and new columns, contradicting pool: false below, and would
  # preempt the engine unmapped-value policy decision.
  crosswalk:
  - old_stem: '003'
    new_stem: '607'
    org_type: sports_club
  - old_stem: '008'
    new_stem: '608'
    org_type: cultural_hobby
  - old_stem: '013'
    new_stem: '609'
    org_type: trade_union
  - old_stem: '018'
    new_stem: '610'
    org_type: business_professional
  - old_stem: '023'
    new_stem: '611'
    org_type: consumers_auto
  - old_stem: '028'
    new_stem: '612'
    org_type: humanitarian
  - old_stem: '523'  # battery item introduced at cs20m; old-period coverage cs20m-cs22o only
    new_stem: '613'
    org_type: migrants
  - old_stem: '033'
    new_stem: '614'
    org_type: environment_peace
  - old_stem: '038'
    new_stem: '615'
    org_type: religious
  - old_stem: '043'
    new_stem: '616'
    org_type: political_party
  - old_stem: '048'
    new_stem: '617'
    org_type: science_education
  - old_stem: '053'
    new_stem: '618'
    org_type: social_society_youth_seniors
  - old_stem: '058'
    new_stem: '619'
    org_type: other_voluntary
  waves_early:
  - cs08a
  - cs09b
  - cs10c
  - cs11d
  - cs12e
  - cs13f
  - cs14g
  - cs15h
  - cs16i
  - cs17j
  - cs18k
  - cs19l
  - cs20m
