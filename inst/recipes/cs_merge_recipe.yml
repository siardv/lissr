  comparability:
    status: partial
    method: pool_with_flags
    rationale: 'Map the thirteen organisation-battery ''no connection'' stems (003-058 in steps of five, plus 523
      introduced at cs20m) to the ''none of these'' replacement stems (607-619) introduced in cs23p. Conservative strategy:
      do NOT pool. A single flag column (org_membership_period) marks the period.

      '
