# conforms to CANONICAL_SCHEMA.md v1.0.0

meta:
  module: cs
  module_label: Culture and Sports
  recipe_version: "1.2.0"
  created: '2026-02-10'
  source_spec: cross-wave harmonization specification
  covered_waves:
  - cs08a
  - cs09b
  - cs10c
  - cs11d
  - cs12e
  - cs13f
  - cs14g
  - cs15h
  - cs16i
  - cs17j
  - cs18k
  - cs19l
  - cs20m
  - cs21n
  - cs22o
  - cs23p
  - cs24q
  - cs25r
  notes: >-
    All rule IDs are prefixed A1-A6 to match the six anomaly categories. Rules
    are applied in the order: rename -> type_coercion -> recode -> boundary ->
    derive -> drop.

    realigned the A3 crosswalk to the thirteen-block organisation battery (old
    stems 003-058 in steps of five, plus 523, mapped to 607-619) and corrected
    the org_type assignments that were shifted by one block from 033 onward;
    corrected the A4d_stem431_platform phase windows to the item lifetime
    cs12e-cs19l (discontinued at cs20m); added five DK-shift recodes for the
    social-network background families (origin 9, education 8, employment 4,
    age 14, household position 6, all -> -9, restricted to cs08a-cs19l) and an
    evening-socialization DK recode (8 -> -9 on stems 290-293 and 634-636);
    extended A5_na_code_9 and V06 to the cs23p replacement stems 634-636;
    replaced the V01 scope with the empirically derived 999-DK stem list (001,
    002, 283); removed late-discontinued stems 163/168/170 from the V04 scope
    and added stem 500 to the hobby flag and missingness scopes; expanded the
    DR01 drop list (072, 471, 482, 532-534, 537) and reworded its reason;
    populated source_spec.
  schema_version: "1.0.0"
global:
  id_variable: nomem_encr
  wave_variable: wave_id
  year_variable: wave_year
  labelled_policy: to_numeric
  missing_variable_policy: warn_and_skip
  strip_label_whitespace: true
  expected_presence:
    critical:
    - variable: nomem_encr
      waves: all
      on_absence: error
    - variable: fieldwork_ym
      waves: all
      on_absence: warn
    optional_note: add module-specific critical variables here
