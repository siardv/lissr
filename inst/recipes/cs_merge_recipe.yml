    rationale: Stem 476 (Twitter -> X) at cs23p.
drop_retain_rules:
- rule_id: A6a_nohouse_encr
  anomaly_ref: A-06
  description: 'nohouse_encr present cs08a-cs12e only.  Retain where available; fill NA elsewhere.  Document that household-level
    analysis is limited to 2008-2012 unless external linkage file is supplied.

    '
  action: retain_if_present
  variable: nohouse_encr
  fill_missing_waves: NA
  log: true
- rule_id: A6b_stem002_dropped
  anomaly_ref: A-06
  description: 'Stem 002 (satisfaction with way of spending leisure) present in cs08a-cs19l only.  Retain where available;
    fill NA in cs20m+.

    '
  action: retain_if_present
  variable: stem_002
  present_waves:
  - cs08a
  - cs09b
  - cs10c
  - cs11d
  - cs12e
  - cs13f
  - cs14g
  - cs15h
  - cs16i
  - cs17j
  - cs18k
  - cs19l
  absent_waves:
  - cs20m
  - cs21n
  - cs22o
  - cs23p
  - cs24q
  - cs25r
  fill_missing_waves: NA
  log: true
- rule_id: DR01_open_text
  anomaly_ref: null
  description: Drop open-text comment/name/specify variables, interview timestamps, and the labelled illness-type item.
  action: drop
  pattern: '^s(065|072|078|123|322|333|344|355|366|375|376|377|378|471|482|528|529|530|531|532|533|534|535|536|537|538|539|540|549|557)$'
  stems:
  - '065'
  - '072'
  - '078'
  - '123'
  - '322'
  - '333'
  - '344'
  - '355'
  - '366'
  - '375'
  - '376'
  - '377'
  - '378'
  - '471'
  - '482'
  - '528'
  - '529'
  - '530'
  - '531'
  - '532'
  - '533'
  - '534'
  - '535'
  - '536'
  - '537'
  - '538'
  - '539'
  - '540'
