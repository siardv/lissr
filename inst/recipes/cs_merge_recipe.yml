  rule_id: DV01_instrument_period
  anomaly_ref: null
  description: 'Indicator for the three instrument eras, derived from wave_id.

    '
  type: character
  # TODO_REEXPRESS: the source payload below is documentation-only; the engine materialises derived variables as
  # all-NA.
  source:
    early_instrument:
      waves:
      - cs08a
      - cs09b
      - cs10c
      - cs11d
      - cs12e
      - cs13f
      - cs14g
      - cs15h
      - cs16i
      - cs17j
      - cs18k
      - cs19l
    redesigned_instrument:
      waves:
      - cs20m
      - cs21n
      - cs22o
    post_reorganization:
      waves:
      - cs23p
      - cs24q
      - cs25r
  if_absent: warn_and_create_na
  log: true
- name: any_dk
  rule_id: DV02_dk_flag
  anomaly_ref: null
  description: 'Binary flag: 1 if any substantive variable on this row equals -9 (don''t know), 0 otherwise.

    '
  type: integer
  # TODO_REEXPRESS: the source and depends_on payloads below are documentation-only; the engine materialises derived
  # variables as all-NA.
  source: as.integer(any(c_across(starts_with('stem_')) == -9, na.rm = TRUE))
  if_absent: warn_and_create_na
  log: true
  depends_on: all_stem_vars
validation_checks:
- check_id: V01_no_999_remaining
  anomaly_ref: A-01
  description: 'After DK harmonization, no value of 999 should remain on the stems that carried a 999 DK label in
    cs08a-cs19l (empirically 001, 002, 283). Euro amount stems 064-076 carry no 999 DK label and are excluded by design,
    since 999 can be a legitimate amount there and a blanket all_stem_vars scope would raise false errors.

    '
  type: none_equal
  severity: error
  scope:
  - '001'
  - '002'
  - '283'
  value: 999
- check_id: V02_dk_code_present_all_waves
  anomaly_ref: A-01
  description: DK code -9 should appear in at least one variable per wave.
  type: value_present_per_wave
  severity: warning
  scope: 001
  value: -9
- check_id: V03_hobby_freq_missingness_early
  anomaly_ref: A-02
  description: 'Stems 160-179 should have >50% NA in early-instrument waves (structural missing from skip logic).

    '
  type: na_rate_above
  severity: warning
  scope:
  - 160
  - 161
  - 162
  - 163
  - 164
  - 165
  - 166
  - 167
  - 168
  - 169
  - 170
  - 171
  - 172
  - 173
  - '500'  # blu-ray/DVD item present from cs15h; conditional like the rest of the early battery
  wave_filter:
  - cs08a
  - cs09b
  - cs10c
  - cs11d
  - cs12e
  - cs13f
  - cs14g
  - cs15h
  - cs16i
  - cs17j
  - cs18k
  - cs19l
  threshold: 0.5
- check_id: V04_hobby_freq_missingness_late
  anomaly_ref: A-02
  description: 'Stems 160-179 should have <5% NA in post-redesign waves (asked unconditionally after cs20m).

    '
  type: na_rate_below
  severity: warning
  scope:
  - 160
  - 161
  - 162
  - 164
  - 165
  - 166
  - 167
  - 169
  - 171
  - 172
  - 173
  # stems 163, 168, 170 removed (discontinued after cs19l, cs14g, cs19l respectively; always-NA in late waves)
  - '500'  # relabelled films and series at cs20m; asked unconditionally post-redesign
  wave_filter:
  - cs20m
  - cs21n
  - cs22o
  - cs23p
  - cs24q
  - cs25r
  threshold: 0.05
- check_id: V05_no_duplicate_ids
  anomaly_ref: null
  description: No respondent should appear more than once within a wave.
  type: unique_per_wave
  severity: error
  scope: nomem_encr
- check_id: V06_na_codes_standardized
  anomaly_ref: A-05
  description: 'After NA and DK harmonization, stems 290-293 and 634-636 should contain no value of 9 (not applicable -> -7) and no value of 8 (DK -> -9); stems 323/334/345/356/367 no value of 5, stems 324/335/346/357/368 no value of 8,
    stems 325/336/347/358/369 no value of 4.

    '
  type: value_absence
  severity: error
  checks:
  - stems:
    - '290'
    - '291'
    - '292'
    - '293'
    - '634'
    - '635'
    - '636'
    forbidden_value: 9
  - stems:
    - '290'
    - '291'
    - '292'
    - '293'
    - '634'
    - '635'
    - '636'
    forbidden_value: 8
  - stems:
    - '323'
    - '334'
    - '345'
    - '356'
    - '367'
    forbidden_value: 5
  - stems:
    - '324'
    - '335'
    - '346'
    - '357'
    - '368'
    forbidden_value: 8
  - stems:
    - '325'
    - '336'
    - '347'
    - '358'
    - '369'
    forbidden_value: 4
