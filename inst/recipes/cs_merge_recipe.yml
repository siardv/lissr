  description: >
    Recode 999 -> -9 on the pre-cs20m items whose value labels define 999 as
    don't know. Post-cs20m waves already use -9. Suffix list verified against
    cs08a (codes anchored at 999; 44 other variables carry a DK label at
    substantive codes 4-14 and must NOT be touched). Re-verify the list per
    wave before extending: cs09b-cs19l pending the same code-anchored scan.
  action: value_recode
  waves:
  - cs08a
  - cs09b
  - cs10c
  - cs11d
  - cs12e
  - cs13f
  - cs14g
  - cs15h
  - cs16i
  - cs17j
  - cs18k
  - cs19l
  suffixes: ['001', '002', '283']
  from_value: 999
  to_value: -9
  if_absent: warn_and_skip
  log: true

