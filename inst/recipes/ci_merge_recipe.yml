  recipe_version: "1.1.0"
  created: '2026-02-10'
  source_spec: cross-wave harmonization specification
  covered_waves:
  - ci08a
  - ci09b
  - ci10c
  - ci11d
  - ci12e
  - ci13f
  - ci14g
  - ci15h
  - ci16i
  - ci17j
  - ci18k
  - ci19l
  - ci20m
  - ci21n
  - ci22o
  - ci23p
  - ci24q
  - ci25r
  notes: >-
    A-09 re-expressed as crosswalk_rename and A-13 as structural_na (payloads
    preserved); A-01 and V-01 label-scoped from ci_value_labels.csv with
    blanket recoding retained only for 9999999998/9999999999; A-03 wealth
    regex corrected to start at Q178 and remaining 18k/19l drops noted; A-09
    phantom deletions removed (Q071 kept); Q086 reclassified as discontinued;
    DV-05 sources corrected to Q066 (08a-13f) plus Q363 (14g-25r) and extended
    through ci25r; V-07 regex excludes Q400; V-08 scoped to ci19l+ per
    codebook routing; A-14 flag_only rule added; anomaly refs set on
    VR01-VR05, DR01 and V-03; ci08a fieldwork months corrected to June and
    September 2008; substantive descriptions restored.
  schema_version: "1.0.0"
