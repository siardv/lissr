harmonization_rules:
- rule_id: A-01
  anomaly_ref: A-01
  description: 'waves 08a-18k use positive sentinel codes (98/998 prefer not to say; 99/999/9999 do not know; 9999999998 prefer
    not to say and 9999999999 do not know on monetary amounts); waves 19l-25r use -9 (do not know) and -8 (prefer not to say).
    recoding is label-scoped: each block lists exactly the variable-wave pairs whose value-label table marks the code
    as DK or PNTS, so identical numbers occurring as genuine answers (e.g. 999 euro on Leyden item ci14g231) are preserved.
    only 9999999998/9999999999 remain blanket over all numeric columns because collision with real values is impossible. not-applicable-class
    labels (Q256, Q257, Q379) are excluded pending a separate convention.'
