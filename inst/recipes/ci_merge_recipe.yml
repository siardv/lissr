# TODO_REEXPRESS
- rule_id: A-02
  anomaly_ref: A-02
  description: 'Q005 ladder-of-life: wave 15h is coded 1-11 (off-by-one); subtract 1 in 15h so all waves share the 0-10 scale;
    pre-15h waves assumed 0-10 (AMB-01). action remains note_only pending re-expression of the transform payload into an executable
    action (TODO_REEXPRESS).'
  action: note_only
  label: Q005 ladder-of-life harmonization
  variables:
  - Q005
  if_absent: warn_and_skip
  transforms:
  - waves:
    - ci08a
    - ci09b
    - ci10c
    - ci11d
    - ci12e
    - ci13f
    - ci14g
    action: identity
    flag: 'AMB-01: pre-15h scale assumed 0-10'
  - waves:
    - ci15h
    action: subtract
    value: 1
    flag: off-by-one correction applied
  - waves:
    - ci16i
    - ci17j
    - ci18k
    - ci19l
    - ci20m
    - ci21n
    - ci22o
    - ci23p
    - ci24q
    - ci25r
    action: identity
  valid_range:
  - 0
  - 10
  log: per-wave distribution before/after
- rule_id: A-08
  anomaly_ref: A-08
  description: 'Q175 (home ownership): code 98 means prefer not to say in wave 08a only; recode 98 to NA in that wave.'
  action: recode_to_na
  label: Q175 prefer-not-to-say code 98
  variables:
  - Q175
  if_absent: warn_and_skip
  recodes:
  - waves:
    - ci08a
    codes_to_na:
    - code: 98
      reason: PNTS
  log: count of code 98 in wave 08a Q175
- rule_id: A-11
  anomaly_ref: A-11
  description: wave 25r value labels switch to uppercase-initial style (e.g. Yes/No) unlike earlier waves; lowercase the 25r
    labels for cross-wave consistency. ineffective under labelled_policy to_numeric (labels stripped at load); retained for
    to_factor runs.
  action: lowercase_labels
  label: 25r label capitalisation normalisation
  scope: all_labelled
  waves:
  - ci25r
  if_absent: warn_and_skip
  log: number of labels lowercased in 25r
- rule_id: A-15
  anomaly_ref: A-15
  description: Q096 variable label in wave 18k contains the typo 20175 for the year 2017; replace the fragment.
  action: fix_label
  label: Q096 label typo correction
  variables:
  - Q096
  waves:
  - ci18k
  if_absent: warn_and_skip
  old_fragment: '20175'
  new_fragment: '2017'
  log: label correction recorded
- rule_id: A-14
  anomaly_ref: A-14
  description: Q341 (social assistance receipt) label evolves at 19l from Work and Assistance Act (WWB) to Participation Act
    (Participatiewet), reflecting the 2015 legislative rename; cosmetic relabel of the same variable and scale, treated as
    the same series. no transformation; flagged for audit traceability.
  action: flag_only
  label: Q341 WWB to Participatiewet relabel
  variables:
  - Q341
  waves:
  - ci19l
  log: true
boundary_rules:
# TODO_REEXPRESS
- rule_id: A-03
  anomaly_ref: A-03
  description: 'the 19l questionnaire redesign discontinues three documented blocks: per-employer wage detail (Q010-Q036),
    wealth and asset valuations (Q178-Q202) and the Leyden income-evaluation items (Q230-Q235), all last present in ci18k;
    two replacements are non-comparable by construction. action remains note_only pending re-expression (TODO_REEXPRESS);
    the missing-variable policy absorbs the structural absence.'
  action: note_only
  label: '19l structural break: discontinued blocks'
  discontinued_blocks:
  - name: employer_wage_detail
    variables_regex: ^Q0(1[0-9]|2[0-9]|3[0-6])$
    last_wave: ci18k
  - name: wealth_asset_valuations
    variables_regex: ^Q(17[89]|1[89][0-9]|20[0-2])$
    last_wave: ci18k
  - name: leyden_income_evaluation
    variables:
    - Q230
    - Q231
    - Q232
    - Q233
    - Q234
    - Q235
    last_wave: ci18k
  non_comparable_replacements:
  - old: Q004
    new: Q383
    reason: binary preloaded vs self-reported categorical
  - old: Q010+Q019+Q028
    new: Q372
    reason: per-employer sum vs self-reported total
  log: true
  notes:
  - 'a further 39 variables are discontinued at the same boundary without block-level documentation: Q078, Q082, Q086, Q104-Q110,
    Q113, Q116, Q119, Q131, Q137, Q243, Q244, Q256, Q259, Q260, Q262, Q263, Q296-Q298, Q305, Q310-Q312, Q349-Q351, Q357-Q362,
    Q366 (Q004, Q088 and Q089 also end at ci18k but are documented by non_comparable_replacements and DV-03)'
