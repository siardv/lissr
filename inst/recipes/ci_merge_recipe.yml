- check_id: V-02
  anomaly_ref: null
  description: harmonised ladder_of_life must lie within 0-10 after the A-02 offset correction.
  type: assert_range
  severity: warning
  label: Q005 range check
  variable: ladder_of_life
  min: 0
  max: 10
- check_id: V-03
  anomaly_ref: A-03, A-10, A-13
  description: 'wave-by-variable presence matrix: discontinued variables absent after their last wave, late introductions
    absent before their first wave, Q085 absent in 19l-20m only.'
  type: presence_matrix
  severity: warning
  label: variable presence matrix
- check_id: V-04
  anomaly_ref: null
  description: derived benefit-receipt indicators contain only 0, 1 or NA.
  type: assert_values
  severity: warning
  label: derived variable value check
  variables:
  - name: received_social_assistance
    allowed:
    - 0
    - 1
  - name: received_disability_benefit
    allowed:
    - 0
    - 1
  - name: received_unemployment_benefit
    allowed:
    - 0
    - 1
- check_id: V-05
  anomaly_ref: null
  description: nomem_encr is non-null in every row and unique within each wave.
  type: assert_identifier
  severity: warning
  label: identifier integrity
- check_id: V-06
  anomaly_ref: null
  description: Kolmogorov-Smirnov comparison of key continuous variables across the 18k/19l redesign boundary to detect unexpected
    distributional breaks.
  type: distribution_comparison
  severity: warning
  label: boundary distribution spot-check
  boundary:
  - ci18k
  - ci19l
  variables:
  - Q143
  - Q229
  - Q236
  - Q264
  warn_threshold: 0.001
- check_id: V-07
  anomaly_ref: null
  description: the Q401-Q443 block introduced in 25r must be present only in ci25r; Q400 is excluded because it already exists
    in 23p and 24q.
  type: assert_presence
  severity: warning
  label: 25r new-variable isolation
  variables_regex: ^Q4(0[1-9]|[1-3][0-9]|4[0-3])$
  expected_waves:
  - ci25r
- check_id: V-08
  anomaly_ref: null
  description: 'missingness must follow the age routing introduced at the 19l redesign: codebook_ci19l_EN_2_0.pdf p. 18 gates
    the benefit grid as ''if ci19l002<28 ci19l092'' (orphan''s pension) and ''if ci19l002>49 ci19l095'' (IOAW/IOAZ). scoped
    to ci19l-ci25r; earlier waves ask everyone.'
  type: skip_logic
  severity: warning
  label: missingness vs skip-logic
  rules:
  - variable: Q095
    condition: Q002 <= 49 implies NA
  - variable: Q092
    condition: Q002 >= 28 implies NA
  waves:
  - ci19l
  - ci20m
  - ci21n
  - ci22o
  - ci23p
  - ci24q
  - ci25r
logging:
  log_file: ci_merge_log.jsonl
  report_file: ci_merge_report.txt
  log_format: jsonl
  per_rule_fields:
  - rule_id
  - wave_id
  - variable
  - action
  - rows_affected
  - values_changed
  - distinct_before
  - distinct_after
  - na_count_before
  - na_count_after
  - timestamp
  - duration_ms
  summary_artifact:
    enabled: true
    include:
    - total_na_created
    - total_values_recoded
    - total_rows_dropped
    - total_vars_dropped
    - wave_row_counts
    - per_variable_na_rates
