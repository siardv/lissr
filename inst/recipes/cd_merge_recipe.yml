validation_checks:
- check_id: CHK01_sentinel_residual
  anomaly_ref: A-01
  description: ''
  type: ''
  severity: warning
  sentinel_set:
  - 98
  - 99
  - 999
  - 9999
  - 99999
  - '9999999998'
  - '9999999999'
  - -8
  - -9
  - -999
  exclude_suffixes:
  - 082
  - _m
  - 078
  - 079
  - 080
  - 081
  small_sentinel_exclude_types:
  - monetary
  note: 082=duration in seconds (99/999 legitimate); monetary vars may legitimately contain 98/99
- check_id: CHK02_satisfaction_range
  anomaly_ref: A-03
  description: ''
  type: all non-NA in 0:10
  severity: error
  variables:
  - h_satisfaction_dwelling
  - h_satisfaction_vicinity
- check_id: CHK03_rent_period_val5
  anomaly_ref: A-04
  description: ''
  type: no value 5 in h_rent_period where era == era1
  severity: error
- check_id: CHK04_rent_benefit_crosstab
  anomaly_ref: A-05
  description: crosstab h_rent_benefit against its per-wave sources to confirm the three question formulations harmonize consistently
  type: crosstab h_rent_benefit x source (011 in cd08a-cd10c, 086 in cd11d-cd13f, 088 in cd14g-cd25r); all source categories must map per the derivation logic
  severity: warning
- check_id: CHK05_mortgage_range
  anomaly_ref: A-01
  description: ''
  type: all non-NA in [0, 999999999]
  severity: error
  variables:
  - h_mortgage_debt
- check_id: CHK06_id_uniqueness
  anomaly_ref: A-09
  description: no duplicate nomem_encr within any wave_id
  type: uniqueness
  column: nomem_encr
  within: wave_id
  severity: error

- check_id: CHK07_cd10c_no_overlap
  anomaly_ref: A-09
  description: >-
    cd10c respondents unique after the 1.1p supersession fix (previously a
    non-executable free-text check; now the same executable uniqueness gate)
  type: uniqueness
  column: nomem_encr
  within: wave_id
  severity: error

- check_id: CHK08_cd13f_binary
  anomaly_ref: A-13
  description: ''
  type: cd13f vars 041-053 all non-NA in {0,1}
  severity: error
- check_id: CHK09_distribution_boundary
  anomaly_ref: A-03
  description: ''
  type: distribution_comparison
  severity: info
  variables:
  - h_satisfaction_dwelling
  - h_satisfaction_vicinity
  wave_pairs:
  - - cd18k
    - cd19l
- check_id: CHK10_financial_ref_dup
  anomaly_ref: A-07
  description: ''
  type: h_financial_ref_year == 2014 for cd15h and cd16i
  severity: info
- check_id: CHK11_cd10c_stack_uniqueness
  anomaly_ref: A-09
  description: executable form of the B01 post_check; after stacking cd10c_EN_1_0p and cd10c_EN_1_1p the wave must contain no duplicate respondent ids
  type: uniqueness
  severity: error
  variable: nomem_encr
  scope_wave: cd10c
logging:
  log_file: cd_merge_log.jsonl
  report_file: cd_merge_report.txt
  log_format: jsonl
  per_rule_fields:
  - rule_id
  - wave_id
  - variable
  - action
  - rows_affected
  - values_changed
  - distinct_before
  - distinct_after
  - na_count_before
  - na_count_after
  - timestamp
  - duration_ms
  summary_artifact:
    enabled: true
    include:
    - total_na_created
    - total_values_recoded
    - total_rows_dropped
    - total_vars_dropped
    - wave_row_counts
    - per_variable_na_rates
