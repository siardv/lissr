# conforms to CANONICAL_SCHEMA.md v1.0.0

meta:
  module: cd
  module_label: Housing
  recipe_version: "1.1.0"
  created: '2026-02-10'
  source_spec: cross-wave harmonization specification
  covered_waves:
  - cd08a
  - cd09b
  - cd10c
  - cd11d
  - cd12e
  - cd13f
  - cd14g
  - cd15h
  - cd16i
  - cd17j
  - cd18k
  - cd19l
  - cd20m
  - cd21n
  - cd22o
  - cd23p
  - cd24q
  - cd25r
  notes: >-
    re-expressed R01-R09 as wave-scoped rename rules and S01/S02 as typed
    recode_to_na rules in harmonization_rules with suffix lists derived from
    cd_value_labels.csv; corrected the h_mortgage_ref_type boundary (0 cd08a,
    1 cd09b-cd23p, 2 cd24q-cd25r); corrected the cd25r expansion count to 127;
    restored structured dependencies on the four copy-derived variables and
    wave_values on h_recall_months (TODO_REEXPRESS); filled CHK04; added CHK11
    as the executable form of the B01 post_check.
  schema_version: "1.0.0"
global:
  id_variable: nomem_encr
  wave_variable: wave_id
  year_variable: wave_year
  labelled_policy: to_numeric
  missing_variable_policy: warn_and_create_na
  strip_label_whitespace: true
  expected_presence:
    critical:
    - variable: nomem_encr
      waves: all
      on_absence: error
    - variable: fieldwork_ym
      waves: all
      on_absence: warn
    optional_note: add module-specific critical variables here
