validation_checks:
- check_id: VC01_no_raw_dk
  anomaly_ref: §3.1
  description: no 99, 999, or −9 remains in valid substantive range
  type: assert_absent_values
  severity: error
  scope: all_numeric
  # percent-chance batteries excluded; they are 0-100 scales where 99
  # is a legitimate substantive value, so a blanket forbid false-fails there.
  # suffix union compiled from cv_variables.csv across cv17i-cv25q (not every
  # suffix exists in every wave). 243 also retains structural 999/-9
  # eligibility codes post HR01c/HR02 carve-outs. cv17i_Total is the renamed
  # cv17i Total column (VR04). residual -9 on _m1-_m3, 160, 242 in cv23o+
  # (HR02 carve-outs) is NOT excluded here and will surface as informative
  # hits until the structural sentinel convention lands.
  exclude_suffixes:
  - '243'
  - '245'
  - '246'
  - '247'
  - '248'
  - '249'
  - '250'
  - '251'
  - '252'
  - '253'
  - '254'
  - '255'
  - '256'
  - '257'
  - '258'
  - '259'
  - '260'
  - '261'
  - '262'
  - '263'
  - '304'
  - '321'
  - '322'
  - '323'
  - '324'
  - '340'
  - '341'
  exclude_variables:
  - cv17i_Total
  forbidden_values:
  - 99
  - 999
  - -9
- check_id: VC02_no_raw_ref
  anomaly_ref: §3.1
  description: no 998 or −8 remains in valid substantive range
  type: assert_absent_values
  severity: error
  scope: all_numeric
  forbidden_values:
  - 998
  - -8
- check_id: VC03_party_name_populated
  anomaly_ref: §3.2
  description: vote_actual_party is a string (not raw integer) wherever vote_actual is non-NA
  type: assert_type
  severity: error
  variable: vote_actual_party
  expected_type: character
- check_id: VC04_party_bijectivity
  anomaly_ref: §3.2
  description: code→party mapping is one-to-one within each (wave, suffix)
  type: assert_bijective
  severity: error
  group_by:
  - wave
  key: vote_actual
  value: vote_actual_party
- check_id: VC05_satisfaction_boundary
  anomaly_ref: §3.3
  description: compare suffix 001 distribution in cv19k vs cv20l
  type: compare_distributions
  severity: warning
  variable: '001'
  wave_a: cv19k
  wave_b: cv20l
  test: ks_test
- check_id: VC06_dk_rate_boundary
  anomaly_ref: §3.3
  description: compare DK rates across the cv19k→cv20l boundary
  type: compare_dk_rates
  severity: warning
  waves_pre:
  - cv18j
  - cv19k
  waves_post:
  - cv20l
  - cv21m
- check_id: VC07_part_completion_alignment
  anomaly_ref: §3.4
  description: 'in three-part waves, missingness on part-2 items should concentrate among respondents with completed_part2
    == 0

    '
  type: assert_missingness_alignment
  severity: warning
  part: 2
- check_id: VC08_cv16h_filter_count
  anomaly_ref: §3.4
  description: cv16h row count matches expected subsample after group filter
  type: assert_row_count_range
  severity: warning
  wave: cv16h
  min_rows: 1
- check_id: VC09_unique_person_wave
  anomaly_ref: §3.5
  description: each nomem_encr appears at most once per wave
  type: assert_unique
  severity: error
  group_by:
  - wave
  key: nomem_encr
- check_id: VC10_sample_trace
  anomaly_ref: §3.6
  description: random sample of 50 obs spanning all boundaries for manual audit
  type: sample_for_audit
  severity: info
  n: 50
  stratify_by: wave
  output: audit_sample.csv
logging:
  log_file: cv_merge_log.jsonl
  report_file: cv_merge_report.txt
  log_format: jsonl
  per_rule_fields:
