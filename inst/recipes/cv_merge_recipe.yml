  description: drop validation Total column after rename
  action: drop
  wave: cv17i
  variables:
  - cv17i_Total
  reason: computed validation artifact (A12)
  log: true
- rule_id: DR03_retain_core_ids
  anomaly_ref: null
  description: always retain identifier and key structural variables
  action: retain
  variables:
