  - wave
  - fieldwork_month
  - era
  log: false
derived_variables:
- name: wave
  rule_id: DV01_wave
  anomaly_ref: null
  description: per-wave constant equal to the wave id, resolves the all-NA wave column that collapsed VC09 grouping (engine injects only wave_id and wave_year)
  method: direct
  output_type: character
  wave_values:
    cv08a: cv08a
    cv09b: cv09b
    cv10c: cv10c
    cv11d: cv11d
    cv12e: cv12e
    cv13f: cv13f
    cv14g: cv14g
    cv16h: cv16h
    cv17i: cv17i
    cv18j: cv18j
    cv19k: cv19k
    cv20l: cv20l
    cv21m: cv21m
    cv22n: cv22n
    cv23o: cv23o
    cv24p: cv24p
    cv25q: cv25q
    cv26r: cv26r
  if_absent: warn_and_create_na
  log: false
- name: era
  rule_id: DV02_era
  anomaly_ref: null
  description: add era from wave_index
  type: character
  source: wave_index
  if_absent: warn_and_create_na
  log: false
- name: completed_parts  # named for the indicator family,
  # concrete columns listed under targets
  rule_id: DV03_completed_parts
  anomaly_ref: A-11
  description: derive part-completion indicators for three-part waves
  type: character
  source: 'for three_part waves: completed_partN = 1 if _mN is non-missing AND
    _mN != -9, else 0 (-9 on _mN means did not participate in this part, cv23o
    onward; see HR02 carve-out). for single_part and experimental waves:
    all set to 1.

    '
  if_absent: warn_and_create_na
  log: true
  targets:
  - completed_part1
  - completed_part2
  - completed_part3
- name: vote_actual_party
  rule_id: DV04_party_name_actual
  anomaly_ref: A-03
  description: party_name derived from vote_actual via value-label crosswalk
  type: character
  source:
  - vote_actual
  - wave
  if_absent: warn_and_create_na
  log: true
- name: vote_hypo_party
  rule_id: DV05_party_name_hypo
  anomaly_ref: A-03
  description: 'party_name derived from vote_hypo via value-label crosswalk.
    doc note: on the harmonized vote_hypo item, codes 1 and 2 are
    response options, not parties: 1 = would not vote, 2 = not eligible to
    vote. the crosswalk must carry their labels through as-is and downstream
    party analyses must filter them out rather than treat them as parties.

    '
  type: character
  source:
  - vote_hypo
  - wave
  if_absent: warn_and_create_na
  log: true
