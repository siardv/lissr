- rule_id: DR01_drop_timing_vars
  anomaly_ref: null
  description: drop cv16h experimental timing variables from harmonized file
  action: drop
  wave: cv16h
  pattern: ^(maandnr|DatumB|TijdB|DatumE|TijdE)
  reason: administrative experiment metadata, not substantive
  log: true
- rule_id: DR02_drop_total
