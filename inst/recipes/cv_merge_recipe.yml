# conforms to CANONICAL_SCHEMA.md v1.0.0

meta:
  module: cv
  module_label: Politics and Values
  recipe_version: "1.1.0"
  created: '2026-02-10'
  source_spec: cross-wave harmonization specification
  covered_waves:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  - cv13f
  - cv14g
  - cv16h
  - cv17i
  - cv18j
  - cv19k
  - cv20l
  - cv21m
  - cv22n
  - cv23o
  - cv24p
  - cv25q
  - cv26r
  notes: >-
    Year 2015 (cv15) is structurally absent. cv16h spans Dec 2015-Jan 2016.
    Wave ordering follows calendar time, not letter sequence.

    validation-driven corrections: (1) HR01 99-recode restricted to true DK
    suffixes (008, 053, 102-105 for cv08a-cv19k; 012 only cv08a-cv11d);
    999-recode now excludes suffix 243 in cv17i-cv19k where 999 = not
    eligible. (2) VC01 rescoped to exclude percent-chance battery suffixes.
    (3) HR02 -9 blanket carves out suffix 243 (eligibility, cv20l-cv25q) and
    part-participation variables _m1-_m3, 160, 242 (cv23o onward); replacement
    sentinels pending global convention. (4) cv17i vote_hypo_suffix corrected
    209 -> 244; VR02 mapping extended. (5) VR05 waves_present now includes
    cv11d. (6) HR06 set_to_dk list refreshed (drop 005, add 166, 167); remains
    note_only pending drop_after executor. (7) BR05 pools native merged label
    GroenLinks (green party)-PvdA (labor party). (8) VR06 experimental source
    documented as coalesce(maandnr, maandnr_lang). (9) DV03 var_name filled
    (completed_parts); _mN == -9 counts as not completed. (10) DV05
    description documents vote_hypo codes 1/2 as would-not-vote /
    not-eligible. (11) DV06-DV09 marked TODO_REEXPRESS (duplicates of
    BR01-BR03/VR06 flags).
  schema_version: 1.1.0
global:
  id_variable: nomem_encr
  wave_variable: wave_id
  year_variable: wave_year
  labelled_policy: to_numeric
  missing_variable_policy: warn_and_create_na
  strip_label_whitespace: true
  expected_presence:
    critical:
    - variable: nomem_encr
      waves: all
      on_absence: error
    - variable: fieldwork_ym
      waves: all
      on_absence: warn
    optional_note: add module-specific critical variables here
  taxonomy_refs:
    dk_scheme:
      source: taxonomies/cv_dk_scheme.yml
      note: externalize dk_scheme into versioned reference file
    party_scheme:
      source: taxonomies/cv_party_scheme.yml
      note: >-
        schemes 4-5 catalogued in taxonomies/cv_party_scheme.yml (1.0.0),
        schemes 1-3 pending; engine consumption still pending
