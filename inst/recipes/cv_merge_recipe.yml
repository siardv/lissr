variable_rules:
- rule_id: VR01_vote_actual
  anomaly_ref: A-04
  description: rename wave-specific actual-vote suffix to harmonized name
  action: rename
  mapping:
    '054': vote_actual
    '169': vote_actual
    '207': vote_actual
    '307': vote_actual
  if_absent: warn_and_create_na
  log: true
- rule_id: VR02_vote_hypo
  anomaly_ref: A-04
  description: rename wave-specific hypothetical-vote suffix to harmonized name
  action: rename
  mapping:
    058: vote_hypo
    '171': vote_hypo
    '209': vote_hypo
    '244': vote_hypo  # cv17i hypothetical vote lives on 244
    '308': vote_hypo
  if_absent: warn_and_create_na
  log: true
- rule_id: VR03_nohouse
  anomaly_ref: A-10
  description: nohouse_encr present only in cv08a–cv12e
  action: ensure_column
  target: nohouse_encr
  waves_present:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  if_absent: warn_and_create_na
  log: true
- rule_id: VR04_total_col
  anomaly_ref: A-17
  description: rename or drop the non-prefixed Total column in cv17i
  action: rename
  wave: cv17i
  from: Total
  to: cv17i_Total
  if_absent: warn_and_skip
  log: true
- rule_id: VR05_vote_confidence
  anomaly_ref: A-20
  description: suffixes 060–064 present only in cv08a–cv11d (dropped at cv12e)
  action: ensure_column
  targets:
  - '060'
  - '061'
  - '062'
  - '063'
  - '064'
  waves_present:
  - cv08a
  - cv09b
  - cv10c
  - cv11d  # 060-064 still fielded in cv11d; drop occurs at cv12e
  if_absent: warn_and_create_na
  log: true
- rule_id: VR06_fieldwork_month
  anomaly_ref: A-11
  description: harmonise fieldwork month variable across admin structures
  action: derive_fieldwork_month
  sources:
    single_part: _m
    # cv16h splits fieldwork month across maandnr and maandnr_lang by
    # questionnaire arm; correct source is coalesce of the two. executable
    # coalesce support in derive_fieldwork_month is pending engine-side; the
    # current implementation copies the named source as character only.
    experimental: coalesce(maandnr, maandnr_lang)
    three_part: _m1
  target: fieldwork_month
  if_absent: warn_and_skip
  log: true
- rule_id: VR07_cv09b_types
  anomaly_ref: A-14
  description: attempt integer cast for cv09b float columns after NA recoding
  action: safe_integer_cast
  wave: cv09b
  log: true
- rule_id: VR08_age_type
  anomaly_ref: A-16
  description: 'suffix 160 (age): coerce to numeric; structural -9 ("did not participate") is retained here and retargeted to -7 by HR00 per the -7 convention'
  action: coerce_numeric
  suffix: '160'
  log: true
harmonization_rules:
- rule_id: HR00_age160_structural_na7
  anomaly_ref: A-16
  description: 'suffix 160 (age): structural -9 ("did not participate") -> -7 per the -7 convention (raw -9 retained by VR08)'
  action: value_recode
  suffixes: ['160']
  from_value: -9
  to_value: -7
  if_absent: warn_and_skip
  log: true
- rule_id: HR01_dk_high_positive
  anomaly_ref: A-01
  description: recode high-positive DK code 99 to NA_DK on true DK items only
  action: recode_to_na
  waves:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  - cv13f
  - cv14g
  - cv16h
  - cv17i
  - cv18j
  - cv19k
  # scope narrowed from all_numeric. 99 is a legitimate substantive
  # value on the 0-100 percent-chance batteries; blanket recoding destroyed
  # valid data there. 99 = don't know only on the suffixes below (verified
  # against cv_value_labels.csv). suffix scoping mirrors the type_coerce
  # suffixes/variables grammar; bare suffixes resolve to stripped names (s008).
  suffixes:
  - '008'
  - '053'
  - '102'
  - '103'
  - '104'
  - '105'
  recode:
    99: .dk
  sentinel_label: NA_DK
  log: true
- rule_id: HR01b_dk_99_suffix012
  anomaly_ref: A-01
  description: suffix 012 carries 99 = don't know only through cv11d
  action: recode_to_na
  # new rule. from cv12e onward 012 no longer uses 99 as DK, so the
  # recode must stop at cv11d for this suffix.
  waves:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  suffixes:
  - '012'
  recode:
    99: .dk
  sentinel_label: NA_DK
  log: true
- rule_id: HR01c_dk_999
  anomaly_ref: A-01
  description: recode high-positive DK code 999 to NA_DK across numeric columns
  action: recode_to_na
  waves:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  - cv13f
  - cv14g
  - cv16h
  - cv17i
  - cv18j
  - cv19k
  scope: all_numeric
  # on suffix 243 in cv17i-cv19k, 999 means 'I am not eligible to
  # vote', not DK; excluded here pending the eligibility sentinel decision
  # exclude semantics: each block skips cells
  # where suffix AND wave both match. engine support implemented in
  # liss_merge_engine.R (recode_to_na honors rule$exclude blocks).
  exclude:
  - suffixes:
    - '243'
    waves:
    - cv17i
    - cv18j
    - cv19k
  recode:
    999: .dk
  sentinel_label: NA_DK
  log: true
- rule_id: HR02_dk_negative
  anomaly_ref: A-01
  description: recode negative DK code to NA_DK
  action: recode_to_na
  waves:
  - cv20l
  - cv21m
  - cv22n
  - cv23o
  - cv24p
  - cv25q
  - cv26r
  scope: all_numeric
  # -9 is polysemous in the negative-code era. carve-outs below keep
  # the blanket recode away from cells where -9 is structural, not DK:
  #   suffix 243 (cv20l-cv25q): -9 = 'I am not eligible to vote'
  #   _m1/_m2/_m3, 160, 242 (cv23o onward): -9 = 'did not participate in
  #   this part' under the multi-part design
  # replacement sentinel values for these structural codes are TODO pending
  # the module-global sentinel convention (proposes -7 for structural NA).
  # until then the raw -9 stays in place on
  # the excluded cells and will surface in VC01 as informative hits.
  # exclude semantics: each block skips cells where suffix AND wave both
  # match; grammar mirrors type_coerce suffixes/variables lists. engine
  # support implemented (recode_to_na honors rule$exclude blocks).
  exclude:
  - suffixes:
    - '243'
    waves:
    - cv20l
    - cv21m
    - cv22n
    - cv23o
    - cv24p
    - cv25q
    - cv26r
  - suffixes:
    - _m1
    - _m2
    - _m3
    - '160'
    - '242'
    waves:
    - cv23o
    - cv24p
    - cv25q
    - cv26r
  recode:
    -9: .dk
  sentinel_label: NA_DK
  log: true
- rule_id: HR03_ref_high_positive
  anomaly_ref: A-02
  description: recode high-positive refusal code to NA_REF
  action: recode_to_na
  waves:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  - cv13f
  - cv14g
  - cv16h
  - cv17i
  - cv18j
  - cv19k
  scope: all_numeric
  recode:
    998: .ref
  sentinel_label: NA_REF
  log: true
- rule_id: HR04_ref_negative
  anomaly_ref: A-02
  description: recode negative refusal code to NA_REF
  action: recode_to_na
  waves:
  - cv20l
  - cv21m
  - cv22n
  - cv23o
  - cv24p
  - cv25q
  - cv26r
  scope: all_numeric
  recode:
    -8: .ref
  sentinel_label: NA_REF
  log: true
- rule_id: HR05_party_crosswalk
  anomaly_ref: A-03
  description: 'derive party_name from numeric party codes using value_labels.csv. applied per (wave, variable-suffix) pair.

    '
  action: label_to_string
  source_file: cv_value_labels.csv
  key_columns:
  - file
  - variable
  value_column: value_labels_value
  label_column: value_labels_label
  target_variables:
  - vote_actual
  - vote_hypo
  derived_suffix: _party
  if_absent: warn_and_skip
  log: true
- rule_id: HR06_standalone_dk_fold
  anomaly_ref: A-01
  description: 'in pre-cv20l waves, when suffix 007=1 (news DK) or suffix 074=1 (participation DK), set related block items
    to NA_DK, then drop the standalone indicators.

    '
  action: note_only  # TODO_REEXPRESS: payload is dead code under note_only;
  # no implemented executor covers conditional fold + drop_after, so this
  # stays documentary until the engine grows one. do not silently re-express
  # into recode/drop: the fold is conditional on the indicator value.
  waves:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  - cv13f
  - cv14g
  - cv16h
  - cv17i
  - cv18j
  - cv19k
  actions:
  - condition: 007 == 1
    # 005 leaves the battery after cv10c; 166 and 167 join
    # at cv11d. item presence is wave-dependent; an eventual executor should
    # skip absent items (if_absent: warn_and_skip).
    set_to_dk:
    - '002'
    - '003'
    - '004'
    - '006'
    - '166'
    - '167'
  - condition: 074 == 1
    set_to_dk:
    - '065'
    - '066'
    - '067'
    - 068
    - 069
    - '070'
    - '071'
    - '072'
    - '073'
  drop_after:
  - '007'
  - '074'
  if_absent: warn_and_skip
  log: true
boundary_rules:
- rule_id: BR01_stem_reversal
  anomaly_ref: A-05
  description: flag post-cv20l observations for stem reversal on suffix 001
  action: add_flag
  boundary: cv19k -> cv20l
  target: '001'
  flag_variable: post_stem_reversal
  flag_value_pre: 0
  flag_value_post: 1
  waves_pre:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  - cv13f
  - cv14g
  - cv16h
  - cv17i
  - cv18j
  - cv19k
  waves_post:
  - cv20l
  - cv21m
  - cv22n
  - cv23o
  - cv24p
  - cv25q
  - cv26r
  log: true
  comparability:
    status: comparable
    method: pool_ok
    rationale: no known comparability issue
- rule_id: BR02_participation_reword
  anomaly_ref: A-06
  description: flag wording version for participation items 065, 073
  action: add_flag
  boundary: cv19k -> cv20l
  targets:
  - '065'
  - '073'
  flag_variable: participation_wording_version
  flag_value_pre: 1
  flag_value_post: 2
  waves_pre:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  - cv13f
  - cv14g
  - cv16h
  - cv17i
  - cv18j
  - cv19k
  waves_post:
  - cv20l
  - cv21m
  - cv22n
  - cv23o
  - cv24p
  - cv25q
  - cv26r
  log: true
  comparability:
    status: comparable
    method: pool_ok
    rationale: no known comparability issue
- rule_id: BR03_news_era
  anomaly_ref: A-07
  description: assign news_battery_era indicator
  action: add_era_flag
  flag_variable: news_battery_era
  assignments:
    A:
    - cv08a
    - cv09b
    - cv10c
    - cv11d
    - cv12e
    B:
    - cv13f
    - cv14g
    - cv16h
    - cv17i
    - cv18j
    - cv19k
    - cv20l
    - cv21m
    C:
    - cv22n
    - cv23o
    D:
    - cv24p
    - cv25q
    - cv26r
  log: true
  comparability:
    status: partial
    method: pool_with_flags
    rationale: assign news_battery_era indicator
- rule_id: BR04_cv16h_filter
  anomaly_ref: A-08
  description: 'for cv16h, retain only groep in {0,1,2} (normal-length administration). exclude groups 3–6 (3-part and 10-part
    experimental conditions).

    '
  action: filter_rows
  wave: cv16h
  variable: groep
  keep_values:
  - 0
  - 1
  - 2
  log: true
- rule_id: BR05_gl_pvda_combined
  anomaly_ref: A-18
  description: 'for trend analysis, derive vote_gl_pvda_combined by pooling GroenLinks and PvdA voters in pre-cv24p waves.

    '
  action: derive_combined_party
  party_names_to_pool:
  - GroenLinks (green party)
  - PvdA (labor party)
  - GroenLinks
  - PvdA
  # cv24p/cv25q field the merged ticket as a single native option;
  # without it the derived series breaks exactly at the boundary it exists
  # to bridge. exact label as printed in cv_value_labels.csv (code 20 on 307).
  - GroenLinks (green party)-PvdA (labor party)
  combined_label: GroenLinks-PvdA (combined)
  target_variable: vote_gl_pvda_combined
  source_variable: vote_actual_party
  log: true
- rule_id: BR06_confidence_wording
  anomaly_ref: A-19
  description: flag minor wording shift in confidence items from cv22n+
  action: add_flag
  flag_variable: confidence_wording_version
  flag_value_pre: 1
  flag_value_post: 2
  waves_pre:
  - cv08a
  - cv09b
  - cv10c
  - cv11d
  - cv12e
  - cv13f
  - cv14g
  - cv16h
  - cv17i
  - cv18j
  - cv19k
  - cv20l
  - cv21m
  waves_post:
  - cv22n
  - cv23o
  - cv24p
  - cv25q
  - cv26r
  log: true
  comparability:
    status: comparable
    method: pool_ok
    rationale: no known comparability issue
