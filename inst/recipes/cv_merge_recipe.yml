  - wave_id
  - variable
  - action
  - rows_affected
  - values_changed
  - distinct_before
  - distinct_after
  - na_count_before
  - na_count_after
  - timestamp
  - duration_ms
  summary_artifact:
    enabled: true
    include:
    - total_na_created
    - total_values_recoded
    - total_rows_dropped
    - total_vars_dropped
    - wave_row_counts
    - per_variable_na_rates
